app = "trythissoftware-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  BASE_DOMAIN = "trythissoftware.com"
  WORKSPACE_ROOT = "/data/workspaces"
  # DATABASE_URL, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, JWT_SECRET set via:
  # fly secrets set --app trythissoftware-api KEY=value

[[mounts]]
  # Fly volumes are single-machine attachments; this app is intentionally a warm singleton.
  source = "workspace_data"
  destination = "/data/workspaces"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine alive so analyze requests don't pay a 15-30s cold-start penalty.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1
  # Allow up to 5 minutes for long-running operations (git clone + analysis).
  idle_timeout = 300

[vm]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
